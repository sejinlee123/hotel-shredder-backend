spring.application.name=HotelBooking
server.port=${PORT:9090}
server.address=0.0.0.0

# Import additional configuration from .env if present
spring.config.import=optional:file:.env[.properties]

# PostgreSQL connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}

# JWT secret
secretJwtString=${JWT_SECRET}

# Mail configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# The maximum size of image that can be uploaded
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB

## Stripe
stripe.api.public.key=${STRIPE_PUBLIC_KEY}
stripe.api.secret.key=${STRIPE_SECRET_KEY}
